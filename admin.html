<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel · SENDI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #05050a);
            font-family: 'Inter', 'Space Grotesk', sans-serif;
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(13, 17, 25, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 165, 89, 0.2);
            padding: 2rem;
        }
        .admin-container h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
        }
        input, button {
            padding: 12px 20px;
            margin: 5px;
            border-radius: 60px;
            border: none;
            font-family: 'Inter', sans-serif;
        }
        input {
            background: rgba(1, 5, 17, 0.8);
            border: 1px solid rgba(255, 165, 89, 0.3);
            color: white;
            width: 220px;
        }
        button {
            background: linear-gradient(135deg, #ffa559, #ff884d);
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255,165,89,0.3);
        }
        .pending-item, .uid-item {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 165, 89, 0.15);
        }
        hr { border-color: rgba(255,165,89,0.2); margin: 20px 0; }
        h3, h4 { color: #ffbc6e; margin: 20px 0 10px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>🔐 SENDI STORE · ADMIN DASHBOARD</h2>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button id="loginBtn">Login</button>
        <div id="adminContent" style="display:none; margin-top:20px;">
            <h3>➕ Tambah Koin (Manual)</h3>
            <input type="text" id="kodeAkunTarget" placeholder="Kode Akun User">
            <input type="number" id="jumlahKoin" placeholder="Jumlah Koin">
            <button id="isiKoinBtn">💾 Tambah Koin</button>
            
            <hr>
            <h3>📋 Pending Topup</h3>
            <div id="pendingList"></div>
            
            <hr>
            <h3>📦 Kelola UID</h3>
            <div id="uidManage"></div>
            
            <h4>➕ Tambah UID Baru</h4>
            <input type="text" id="newUid" placeholder="UID">
            <input type="number" id="newPriceCoin" placeholder="Harga Koin">
            <button id="addUidBtn">Tambah UID</button>
            
            <hr>
            <h4>🖼️ Ganti QRIS</h4>
            <input type="text" id="qrisLinkInput" placeholder="Link gambar QRIS (catbox)">
            <button id="gantiQrisBtn">Ganti QRIS</button>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
